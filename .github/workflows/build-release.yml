name: Build and Release Executables

on:
  push:
    branches:
      - main
    paths:
      - '**.py'
      - 'requirements.txt'
      - '.github/workflows/build-release.yml'
      - '*.html'
      - '*.js'
      - '*.css'
      - '*.jpg'
      - '*.png'
      - '*.woff2'
      - '*.nsi'
      - 'tasks/**'
      - 'Prosthetic/**'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Inject build version
        shell: bash
        run: |
          sed -i.bak 's/^_INJECTED = .*/_INJECTED = "build-${{ github.run_number }}"/' version.py
          rm -f version.py.bak

      # Set a single APP_NAME env var used by all subsequent steps.
      # Tag stays "build-N" for the version-checker; the human-readable
      # label and filenames use the professional "LonghornNIL_vN" format.
      - name: Set app name
        shell: bash
        run: |
          echo "APP_NAME=LonghornNeuralInterface_${{ runner.os }}_v1.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build Executable (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          pyinstaller --onefile --windowed \
            --collect-all mne --collect-all brainflow --collect-all pylsl \
            --hidden-import=PyQt6.QtOpenGL \
            --hidden-import=PyQt6.QtOpenGLWidgets \
            --hidden-import=PyQt6.sip \
            --hidden-import=Prosthetic.prosthetic_gui \
            --icon "145164501.png" \
            --add-data "tasks/motor_imagery/index.html:tasks/motor_imagery" \
            --add-data "tasks/motor_imagery/app.js:tasks/motor_imagery" \
            --add-data "tasks/motor_imagery/styles.css:tasks/motor_imagery" \
            --add-data "tasks/motor_imagery/SpaceGrotesk.woff2:tasks/motor_imagery" \
            --add-data "beach.jpg:." \
            --add-data "145164501.png:." \
            --add-data "banner.png:." \
            --add-data "version.py:." \
            --name "$APP_NAME" \
            GUI.py

      - name: Build Executable (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pyinstaller --onefile --windowed \
            --collect-all mne --collect-all brainflow --collect-all pylsl \
            --hidden-import=PyQt6.QtOpenGL \
            --hidden-import=PyQt6.QtOpenGLWidgets \
            --hidden-import=PyQt6.sip \
            --hidden-import=Prosthetic.prosthetic_gui \
            --icon "145164501.png" \
            --add-data "tasks/motor_imagery/index.html;tasks/motor_imagery" \
            --add-data "tasks/motor_imagery/app.js;tasks/motor_imagery" \
            --add-data "tasks/motor_imagery/styles.css;tasks/motor_imagery" \
            --add-data "tasks/motor_imagery/SpaceGrotesk.woff2;tasks/motor_imagery" \
            --add-data "beach.jpg;." \
            --add-data "145164501.png;." \
            --add-data "banner.png;." \
            --add-data "version.py;." \
            --name "$APP_NAME" \
            GUI.py

      # ── Windows NSIS Installer ──────────────────────────────────────────
      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Convert icon to ICO
        if: runner.os == 'Windows'
        run: |
          pip install Pillow
          python -c "from PIL import Image; Image.open('145164501.png').save('145164501.ico')"

      - name: Build Windows Installer
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Copy only the Windows exe into a staging folder so the installer
          # doesn't accidentally bundle Linux/macOS artefacts.
          mkdir -p installer_dist
          cp dist/*.exe installer_dist/

          "/c/Program Files (x86)/NSIS/makensis.exe" \
            -DVERSION=${{ github.run_number }} \
            -DDIST_PATH=installer_dist \
            installer.nsi

          # Remove the standalone exe — only ship the installer
          rm -f dist/*.exe
          mv "LonghornNeuralInterface_Windows_Setup_v1.${{ github.run_number }}.exe" dist/

      # ── macOS ──────────────────────────────────────────────────────────
      - name: Build .app Bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --windowed \
            --collect-all mne --collect-all brainflow --collect-all pylsl \
            --hidden-import=PyQt6.QtOpenGL \
            --hidden-import=PyQt6.QtOpenGLWidgets \
            --hidden-import=PyQt6.sip \
            --hidden-import=Prosthetic.prosthetic_gui \
            --icon "145164501.png" \
            --add-data "tasks/motor_imagery/index.html:tasks/motor_imagery" \
            --add-data "tasks/motor_imagery/app.js:tasks/motor_imagery" \
            --add-data "tasks/motor_imagery/styles.css:tasks/motor_imagery" \
            --add-data "tasks/motor_imagery/SpaceGrotesk.woff2:tasks/motor_imagery" \
            --add-data "beach.jpg:." \
            --add-data "145164501.png:." \
            --add-data "banner.png:." \
            --add-data "version.py:." \
            --name "$APP_NAME" \
            GUI.py

      - name: Install Apple Certificate
        if: runner.os == 'macOS'
        env:
          CERT_BASE64: ${{ secrets.MAC_CERTS_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$CERT_BASE64" | base64 --decode -o $CERT_PATH
          security create-keychain -p "actions" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "actions" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Sign the macOS App
        if: runner.os == 'macOS'
        run: |
          codesign --deep --force --options runtime \
            --sign "Developer ID Application" \
            "dist/${APP_NAME}.app"

      - name: Zip for Notarization
        if: runner.os == 'macOS'
        run: |
          /usr/bin/ditto -c -k --keepParent \
            "dist/${APP_NAME}.app" \
            "dist/${APP_NAME}.zip"

      - name: Notarize the App
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "dist/${APP_NAME}.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

      - name: Staple the Ticket and Final Zip
        if: runner.os == 'macOS'
        run: |
          xcrun stapler staple "dist/${APP_NAME}.app"
          rm "dist/${APP_NAME}.zip"
          /usr/bin/ditto -c -k --keepParent \
            "dist/${APP_NAME}.app" \
            "dist/${APP_NAME}.zip"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: executable-${{ matrix.os }}
          path: dist/*
          retention-days: 5

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Longhorn Neural Interface Platform v1.${{ github.run_number }}"
          body: |
            Download the appropriate build for your operating system below (Windows .exe, macOS .zip, or Linux executable).
          files: artifacts/*
